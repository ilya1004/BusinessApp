services:
  db:
    image: postgres:16-alpine
    container_name: business-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: business
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d business"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: business-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

  server:
    build:
      context: ./business-server
      dockerfile: Dockerfile
    container_name: business-server
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: business
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: mySuperSecretKeyForJwtTokenGenerationMustBeLongEnough256Bits
    volumes:
      - server_logs:/app/logs
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  server_logs:
